<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MAS Creator — Vibe Graphing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#050810;--bg2:#0c1020;--bg3:#111827;--bg4:#1a2535;--border:#1e2d45;--border2:#2a3f5f;--accent:#3b82f6;--accent2:#06b6d4;--accent3:#8b5cf6;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--orange:#f97316;--pink:#ec4899;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--glow:0 0 20px rgba(59,130,246,.3)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.03)1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03)1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:1.5rem}
/* NAV */
.nav-tabs{display:flex;gap:.4rem;margin-bottom:1.5rem;border-bottom:1px solid var(--border);padding-bottom:.75rem;flex-wrap:wrap}
.nav-tab{padding:.45rem 1.1rem;border-radius:7px 7px 0 0;font-size:.82rem;font-weight:500;cursor:pointer;border:1px solid transparent;color:var(--text3);transition:all .2s;background:transparent}
.nav-tab:hover{color:var(--text2);background:rgba(255,255,255,.03)}
.nav-tab.active{border-color:var(--border);border-bottom-color:var(--bg);color:var(--text);background:var(--bg2);margin-bottom:-1px}
/* HEADER */
header{text-align:center;padding:2rem 0 1.5rem}
.logo{display:inline-flex;align-items:center;gap:.5rem;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);font-family:'JetBrains Mono',monospace;margin-bottom:1rem;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);padding:.35rem .9rem;border-radius:100px}
.logo-dot{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
h1{font-size:clamp(1.6rem,3.5vw,2.6rem);font-weight:700;line-height:1.1;margin-bottom:.5rem}
h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:var(--text2);font-size:.92rem;max-width:560px;margin:0 auto}
/* GRID */
.grid{display:grid;grid-template-columns:360px 1fr;gap:1.1rem}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
.sidebar{display:flex;flex-direction:column;gap:.9rem}
.main-col{display:flex;flex-direction:column;gap:.9rem}
/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1.1rem;transition:border-color .2s}
.ct{font-size:.68rem;text-transform:uppercase;letter-spacing:.15em;color:var(--text3);margin-bottom:.8rem;font-family:'JetBrains Mono',monospace;display:flex;align-items:center;justify-content:space-between;gap:.4rem}
.ctl{display:flex;align-items:center;gap:.4rem}
/* FORMS */
textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:.88rem;padding:.8rem;resize:vertical;min-height:100px;outline:none;line-height:1.6;transition:border-color .2s,box-shadow .2s}
textarea:focus{border-color:var(--accent);box-shadow:var(--glow)}
textarea::placeholder{color:var(--text3)}
.cta{font-family:'JetBrains Mono',monospace;font-size:.76rem;min-height:180px;background:#0d1117;color:#a9b7c6}
input[type=text],select{background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Space Grotesk',sans-serif;font-size:.84rem;padding:.55rem .8rem;outline:none;transition:border-color .2s;width:100%}
input[type=text]:focus,select:focus{border-color:var(--accent)}
select option{background:var(--bg2)}
.fg{display:flex;flex-direction:column;gap:.3rem}
.fl{font-size:.68rem;color:var(--text3);font-family:'JetBrains Mono',monospace}
.row{display:flex;gap:.6rem;flex-wrap:wrap}
.row .fg{flex:1;min-width:120px}
/* BUTTONS */
.btn{padding:.42rem .95rem;border-radius:6px;font-size:.8rem;font-weight:500;cursor:pointer;transition:all .2s;border:1px solid;font-family:'Space Grotesk',sans-serif;display:inline-flex;align-items:center;gap:.35rem;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.bp{background:var(--accent);border-color:var(--accent);color:white}.bp:hover:not(:disabled){background:#2563eb}
.bo{background:transparent;border-color:var(--border2);color:var(--text2)}.bo:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.bg{background:var(--green);border-color:var(--green);color:white}.bg:hover:not(:disabled){background:#059669}
.borg{background:var(--orange);border-color:var(--orange);color:white}.borg:hover:not(:disabled){background:#ea7c19}
.br{background:transparent;border-color:rgba(239,68,68,.4);color:var(--red)}.br:hover:not(:disabled){background:rgba(239,68,68,.1)}
.bpu{background:var(--accent3);border-color:var(--accent3);color:white}.bpu:hover:not(:disabled){background:#7c3aed}
.bpk{background:var(--pink);border-color:var(--pink);color:white}.bpk:hover:not(:disabled){background:#db2777}
.byel{background:var(--yellow);border-color:var(--yellow);color:#000}.byel:hover:not(:disabled){background:#d97706}
.btn-create{width:100%;background:linear-gradient(135deg,var(--accent),var(--accent3));border:none;border-radius:8px;color:white;font-family:'Space Grotesk',sans-serif;font-size:.92rem;font-weight:600;padding:.75rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(59,130,246,.3);margin-top:.85rem}
.btn-create:hover:not(:disabled){opacity:.9}.btn-create:disabled{opacity:.4;cursor:not-allowed}
/* STAGES */
.stages{display:flex;flex-direction:column;gap:.5rem}
.stage{display:flex;align-items:center;gap:.7rem;padding:.6rem .8rem;border-radius:7px;border:1px solid var(--border);background:var(--bg3);transition:all .3s}
.stage.active{border-color:var(--accent);background:rgba(59,130,246,.06);box-shadow:var(--glow)}
.stage.done{border-color:var(--green);background:rgba(16,185,129,.05)}
.stage.paused{border-color:var(--yellow);background:rgba(245,158,11,.08);animation:hilPulse 2s infinite}
.stage.error{border-color:var(--red)}
@keyframes hilPulse{0%,100%{box-shadow:0 0 0 0 rgba(245,158,11,0)}50%{box-shadow:0 0 0 6px rgba(245,158,11,.15)}}
.si{font-size:1rem;width:1.6rem;text-align:center;flex-shrink:0}
.sinfo{flex:1}.sn{font-size:.82rem;font-weight:600}
.sd{font-size:.68rem;color:var(--text3);margin-top:.1rem;font-family:'JetBrains Mono',monospace}
.sb{font-size:.58rem;padding:.12rem .4rem;border-radius:100px;font-family:'JetBrains Mono',monospace}
.bw{background:rgba(100,116,139,.2);color:var(--text3)}.ba{background:rgba(59,130,246,.2);color:var(--accent);animation:blink 1.5s infinite}.bd{background:rgba(16,185,129,.2);color:var(--green)}.be{background:rgba(239,68,68,.2);color:var(--red)}.bhil{background:rgba(245,158,11,.2);color:var(--yellow)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* CHIPS */
.ac{padding:.22rem .55rem;border-radius:100px;font-size:.68rem;font-weight:500;border:1px solid;white-space:nowrap}
.cb{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);color:var(--accent)}
.cp{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.3);color:var(--accent3)}
.cc{background:rgba(6,182,212,.1);border-color:rgba(6,182,212,.3);color:var(--accent2)}
.cg{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--green)}
.co{background:rgba(249,115,22,.1);border-color:rgba(249,115,22,.3);color:var(--orange)}
/* META */
.meta{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.6rem}
.mt{font-size:.67rem;padding:.18rem .45rem;border-radius:100px;font-family:'JetBrains Mono',monospace}
.mt-type{background:rgba(139,92,246,.15);color:var(--accent3);border:1px solid rgba(139,92,246,.25)}
.mt-style{background:rgba(6,182,212,.1);color:var(--accent2);border:1px solid rgba(6,182,212,.2)}
.mt-v{background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.25)}
.pal{display:flex;gap:.3rem;align-items:center;margin-top:.35rem}
.cd{width:12px;height:12px;border-radius:50%;border:1px solid rgba(255,255,255,.2)}
/* TABS */
.tabs{display:flex;gap:.35rem;margin-bottom:.75rem;flex-wrap:wrap}
.tab{padding:.32rem .8rem;border-radius:6px;font-size:.78rem;font-weight:500;cursor:pointer;border:1px solid var(--border);color:var(--text3);transition:all .2s;background:transparent}
.tab.active{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.08)}
/* RESULT HEADER */
.rh{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:.6rem;margin-bottom:.75rem}
.ra{display:flex;gap:.4rem;flex-wrap:wrap}
iframe{width:100%;height:540px;border:1px solid var(--border);border-radius:8px;background:white}
pre.cpre{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.9rem;overflow:auto;max-height:540px;font-family:'JetBrains Mono',monospace;font-size:.75rem;line-height:1.7;color:#a9b7c6;white-space:pre-wrap;word-break:break-word}
/* EDIT PANEL */
.ep{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:.9rem;margin-bottom:.75rem}
/* MARK MODE */
.mark-mode-bar{display:flex;align-items:center;gap:.6rem;padding:.5rem .85rem;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.35);border-radius:8px;margin-bottom:.65rem;font-size:.8rem;color:var(--yellow);animation:hilPulse 2s infinite}
#mark-ctx-menu{position:fixed;z-index:99999;background:var(--bg2);border:1px solid var(--border2);border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.6);padding:.35rem;min-width:155px;display:none}
.ctx-item{padding:.5rem .85rem;border-radius:7px;font-size:.82rem;cursor:pointer;color:var(--text2);display:flex;align-items:center;gap:.5rem;transition:background .15s}
.ctx-item:hover{background:rgba(255,255,255,.07);color:var(--text)}
#annot-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:100000;display:none;align-items:flex-end;justify-content:center;padding:1rem}
#annot-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:16px 16px 0 0;width:100%;max-width:720px;padding:1.2rem;display:flex;flex-direction:column;gap:.75rem;max-height:88vh;overflow-y:auto}
.annot-section-preview{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem;font-size:.72rem;color:var(--text3);font-family:'JetBrains Mono',monospace;max-height:72px;overflow:hidden;white-space:pre;cursor:pointer}
.annot-files-row{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
.annot-file-chip{display:flex;align-items:center;gap:.3rem;background:var(--bg3);border:1px solid var(--border);border-radius:100px;padding:.22rem .6rem;font-size:.72rem;color:var(--text2)}
.annot-file-chip button{background:none;border:none;color:var(--text3);cursor:pointer;font-size:.75rem;padding:0}
.annot-add-file{background:transparent;border:1px dashed var(--border2);border-radius:100px;padding:.22rem .7rem;font-size:.72rem;color:var(--text3);cursor:pointer;transition:all .2s}
.annot-add-file:hover{border-color:var(--accent);color:var(--accent)}
.assets-grid{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.5rem}
.asset-thumb{width:88px;height:60px;border-radius:7px;border:1px solid var(--border);overflow:hidden;cursor:pointer;position:relative;background:var(--bg3);transition:border-color .2s}
.asset-thumb:hover{border-color:var(--accent2)}
.asset-thumb img{width:100%;height:100%;object-fit:cover}
.asset-icon{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.2rem;font-size:1rem;color:var(--text3)}
.asset-icon span{font-size:.55rem}
.asset-copy{position:absolute;bottom:2px;right:2px;background:rgba(0,0,0,.8);border:none;border-radius:3px;color:white;font-size:.55rem;padding:.1rem .28rem;cursor:pointer;opacity:0;transition:opacity .15s}
.asset-thumb:hover .asset-copy{opacity:1}
.ep-t{font-size:.72rem;font-weight:600;color:var(--orange);margin-bottom:.5rem}
.eir{display:flex;gap:.5rem;align-items:flex-end}
.eir textarea{min-height:55px;flex:1;font-size:.82rem}
.sugg{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.4rem}
.sg{font-size:.7rem;padding:.22rem .5rem;border-radius:5px;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .15s;background:transparent}
.sg:hover{border-color:var(--orange);color:var(--orange)}
/* HISTORY */
.hi{display:flex;align-items:center;gap:.55rem;padding:.5rem .7rem;border-radius:7px;border:1px solid var(--border);cursor:pointer;transition:all .2s;background:var(--bg3)}
.hi:hover{border-color:var(--border2)}
.hd{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dd{background:var(--green)}.dr{background:var(--accent);animation:pulse 1.5s infinite}.de{background:var(--red)}.dp{background:var(--yellow)}
/* MODALS */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem;backdrop-filter:blur(4px)}
.md{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;width:100%;max-width:680px;max-height:92vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.md-wide{max-width:1100px}
.md-xl{max-width:1300px}
.mh{padding:1.1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.mt2{font-size:1rem;font-weight:600}
.mc{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1.2rem;padding:.2rem;border-radius:4px}
.mc:hover{color:var(--text)}
.mb{padding:1.1rem 1.25rem;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:.85rem}
.mf{padding:.9rem 1.25rem;border-top:1px solid var(--border);display:flex;gap:.5rem;justify-content:flex-end;flex-shrink:0}
/* TOOL ITEMS */
.ti{padding:.65rem .85rem;border-radius:8px;border:1px solid var(--border);background:var(--bg3);display:flex;align-items:flex-start;gap:.7rem}
.ti-icon{font-size:1.1rem;flex-shrink:0;margin-top:.1rem}
.ti-info{flex:1;overflow:hidden}
.ti-name{font-weight:600;font-size:.82rem;font-family:'JetBrains Mono',monospace;color:var(--accent2)}
.ti-desc{font-size:.72rem;color:var(--text3);margin-top:.12rem;line-height:1.4}
.ti-act{display:flex;gap:.3rem;flex-shrink:0}
.cb2{font-size:.6rem;padding:.1rem .35rem;border-radius:100px;background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.25);margin-left:.3rem}
/* RAG */
.rf{display:flex;align-items:center;gap:.7rem;padding:.6rem .8rem;border-radius:8px;border:1px solid var(--border);background:var(--bg3)}
.rf-icon{font-size:1.1rem;flex-shrink:0}
.rf-info{flex:1;overflow:hidden}
.rf-name{font-size:.82rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rf-meta{font-size:.67rem;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:.1rem}
.rtg{position:relative;width:36px;height:20px;cursor:pointer;flex-shrink:0}
.rtg input{opacity:0;width:0;height:0}
.rsl{position:absolute;inset:0;background:var(--border2);border-radius:100px;transition:.3s}
.rsl:before{content:'';position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s}
.rtg input:checked+.rsl{background:var(--green)}
.rtg input:checked+.rsl:before{transform:translateX(16px)}
.rcb{font-size:.65rem;padding:.12rem .4rem;border-radius:100px;background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.25);font-family:'JetBrains Mono',monospace}
/* GALLERY */
.gg{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:.9rem}
.gc{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .2s;cursor:pointer}
.gc:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.gth{height:140px;background:var(--bg4);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.gth iframe{width:200%;height:200%;border:none;transform:scale(.5);transform-origin:top left;pointer-events:none}
.gth-icon{font-size:2.2rem;opacity:.3}
.gi{padding:.65rem}
.gtl{font-size:.85rem;font-weight:600;margin-bottom:.22rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gde{font-size:.72rem;color:var(--text3);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.gft{display:flex;align-items:center;justify-content:space-between;margin-top:.4rem}
.gs{font-size:.65rem;color:var(--text3);font-family:'JetBrains Mono',monospace}
.gfilt{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.tool-gallery-badge{font-size:.6rem;padding:.1rem .35rem;border-radius:100px;background:rgba(139,92,246,.15);color:var(--accent3);border:1px solid rgba(139,92,246,.25);margin-left:.3rem}
/* LOG PANEL */
.log-panel{background:var(--bg3);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.log-toolbar{display:flex;gap:.4rem;padding:.6rem .8rem;border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.log-filter{font-size:.7rem;padding:.2rem .5rem;border-radius:5px;border:1px solid var(--border);cursor:pointer;background:transparent;color:var(--text3);transition:all .15s}
.log-filter.active{color:var(--text);background:var(--bg4);border-color:var(--border2)}
.log-list{max-height:420px;overflow-y:auto;display:flex;flex-direction:column}
.log-entry{padding:.55rem .8rem;border-bottom:1px solid rgba(30,45,69,.5);font-size:.76rem;font-family:'JetBrains Mono',monospace;transition:background .15s;cursor:pointer}
.log-entry:hover{background:rgba(255,255,255,.02)}
.log-entry.expanded .log-content{display:block}
.log-header{display:flex;align-items:center;gap:.5rem}
.log-level{width:52px;text-align:center;flex-shrink:0;font-size:.62rem;padding:.08rem .3rem;border-radius:3px}
.ll-info{background:rgba(59,130,246,.15);color:var(--accent)}
.ll-prompt{background:rgba(139,92,246,.15);color:var(--accent3)}
.ll-output{background:rgba(16,185,129,.15);color:var(--green)}
.ll-tool{background:rgba(249,115,22,.15);color:var(--orange)}
.ll-hil{background:rgba(245,158,11,.15);color:var(--yellow)}
.ll-error{background:rgba(239,68,68,.15);color:var(--red)}
.ll-graph{background:rgba(6,182,212,.15);color:var(--accent2)}
.log-title{flex:1;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-time{color:var(--text3);font-size:.62rem;flex-shrink:0}
.log-agent{color:var(--accent);font-size:.62rem;flex-shrink:0}
.log-content{display:none;margin-top:.5rem;padding:.5rem;background:rgba(0,0,0,.3);border-radius:4px;white-space:pre-wrap;word-break:break-word;color:#a9b7c6;font-size:.7rem;max-height:300px;overflow-y:auto}
/* GRAPH */
.graph-panel{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:.9rem}
.graph-node{display:flex;align-items:center;gap:.7rem;padding:.65rem .85rem;border-radius:8px;border:2px solid;margin-bottom:.5rem;transition:all .2s}
.gn-done{border-color:var(--green);background:rgba(16,185,129,.06)}
.gn-pending{border-color:var(--border);background:var(--bg4)}
.gn-running{border-color:var(--accent);background:rgba(59,130,246,.06);animation:pulse 1.5s infinite}
.gn-icon{font-size:1.1rem;width:1.8rem;text-align:center}
.gn-info{flex:1}
.gn-name{font-weight:600;font-size:.82rem}
.gn-role{font-size:.7rem;color:var(--text3);font-family:'JetBrains Mono',monospace}
.gn-stats{font-size:.65rem;color:var(--text3);margin-top:.1rem}
.gn-badge{font-size:.6rem;padding:.1rem .35rem;border-radius:100px}
.stage-connector{display:flex;align-items:center;gap:.3rem;padding:.2rem .85rem;color:var(--text3);font-size:.7rem}
/* HIL PANEL */
.hil-panel{background:rgba(245,158,11,.06);border:2px solid var(--yellow);border-radius:12px;padding:1.1rem;animation:hilPulse 2s infinite}
.hil-title{font-size:.85rem;font-weight:700;color:var(--yellow);margin-bottom:.6rem;display:flex;align-items:center;gap:.4rem}
.hil-prompt{background:rgba(0,0,0,.4);border:1px solid rgba(245,158,11,.2);border-radius:6px;padding:.65rem;font-size:.75rem;font-family:'JetBrains Mono',monospace;color:#e2e8f0;max-height:200px;overflow-y:auto;white-space:pre-wrap;word-break:break-word}
.hil-actions{display:flex;gap:.5rem;flex-wrap:wrap;margin-top:.75rem}
/* NETWORK */
.nw-item{display:flex;align-items:center;gap:.65rem;padding:.6rem .8rem;border-radius:8px;border:1px solid var(--border);background:var(--bg3)}
.nw-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.nw-info{flex:1;overflow:hidden}
.nw-type{font-size:.82rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nw-meta{font-size:.67rem;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:.1rem}
.nw-chip{font-size:.6rem;padding:.1rem .3rem;border-radius:4px;background:rgba(6,182,212,.15);color:var(--accent2);border:1px solid rgba(6,182,212,.25)}
/* MISC */
.eb{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:.8rem;color:#fca5a5;font-size:.78rem;line-height:1.6}
.sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.es{text-align:center;padding:2rem 1rem;color:var(--text3)}
.ei{font-size:2rem;margin-bottom:.5rem;opacity:.4}
.notif{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--bg2);border:1px solid var(--green);border-radius:8px;padding:.65rem 1rem;font-size:.82rem;color:var(--green);z-index:9999;animation:su .3s ease;max-width:320px}
@keyframes su{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}
.dv{height:1px;background:var(--border);margin:.5rem 0}
.aib{background:linear-gradient(135deg,var(--accent3),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.img-upload{border:2px dashed var(--border);border-radius:8px;padding:.9rem;text-align:center;cursor:pointer;transition:all .2s;color:var(--text3);font-size:.82rem;margin-top:.5rem}
.img-upload:hover{border-color:var(--accent);color:var(--accent);background:rgba(59,130,246,.04)}
.img-upload input{display:none}
.img-thumbs{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.5rem;justify-content:center}
.img-thumb-wrap{position:relative}
.img-thumb{width:46px;height:46px;border-radius:5px;object-fit:cover;border:1px solid var(--border)}
.img-remove{position:absolute;top:-5px;right:-5px;width:15px;height:15px;border-radius:50%;background:var(--red);color:white;border:none;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center}
.vl{display:flex;flex-direction:column;gap:.35rem}
.vi{display:flex;align-items:center;gap:.5rem;padding:.45rem .65rem;border-radius:6px;border:1px solid var(--border);background:var(--bg3);font-size:.76rem}
.vn{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--accent);background:rgba(59,130,246,.1);padding:.1rem .3rem;border-radius:4px;flex-shrink:0}
.srag{background:rgba(16,185,129,.04);border:1px solid rgba(16,185,129,.15);border-radius:10px;padding:.9rem}
.hil-toggle{display:flex;align-items:center;gap:.6rem;padding:.5rem .7rem;border-radius:8px;border:1px solid var(--border);background:var(--bg3);font-size:.8rem;cursor:pointer}
.hil-toggle.active{border-color:var(--yellow);background:rgba(245,158,11,.06);color:var(--yellow)}
.ppv{height:180px;border-radius:8px;overflow:hidden;border:1px solid var(--border);margin-bottom:.5rem}
.ppv iframe{width:100%;height:100%;border:none;pointer-events:none}
.stage.paused .sb{background:rgba(245,158,11,.2);color:var(--yellow)}
</style>
</head>
<body>
<div class="app" id="root"></div>
<script type="module">
const API='';
let S={
  page:'create',
  request:'',style:'',creationType:'',images:[],
  hilEnabled:false, hilStages:'all',
  jobId:null,jobData:null,polling:null,
  tab:'preview',history:[],error:null,
  editInstruction:'',editImages:[],editLoading:false,
  builtinTools:[],customTools:[],
  toolModal:false,editingTool:null,toolForm:{name:'',description:'',code:''},toolAiLoading:false,toolAiDesc:'',
  ragFiles:[],ragModal:false,
  gallery:[],gallerySearch:'',galleryType:'',galleryTab:'projects',
  galleryModal:false,galleryEntry:null,
  publishModal:false,publishForm:{title:'',tags:'',allowEdit:false},publishLoading:false,
  publishToolModal:false,publishToolId:null,publishToolForm:{description:'',tags:''},
  logs:[],logFilter:'all',logAutoRefresh:true,
  graph:null,
  hilData:null,hilEditPrompt:'',hilNote:'',
  networkJobs:[],networkInput:'',networkModal:false,
  connectJobInput:'',
  notification:null,
};
function set(p){Object.assign(S,p);render();}
function notify(msg,ms=3000){set({notification:msg});setTimeout(()=>set({notification:null}),ms);}

const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const timeAgo=iso=>{if(!iso)return'';const d=(Date.now()-new Date(iso))/1000;return d<60?'agora':d<3600?`${~~(d/60)}m`:d<86400?`${~~(d/3600)}h`:`${~~(d/86400)}d`;};
const chipColor=i=>['cb','cp','cc','cg'][i%4];
const fileIcon=m=>m?.startsWith('image')?'🖼️':m?.includes('pdf')?'📕':m?.includes('python')?'🐍':m?.includes('json')?'📋':m?.includes('csv')?'📊':'📄';
const typeIcon=t=>({website:'🌐',landing_page:'🚀',game:'🎮',dashboard:'📊',code:'💻',api:'🔌',document:'📄',tool:'🔧',other:'✨'}[t]||'✨');
const levelColor=l=>({info:'ll-info',prompt:'ll-prompt',output:'ll-output',tool:'ll-tool',hil:'ll-hil',error:'ll-error',graph:'ll-graph'}[l]||'ll-info');

async function apiFetch(url,opts={}){
  const r=await fetch(API+url,opts);
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.detail||`HTTP ${r.status}`);}
  return r.json();
}
const apiGet=url=>apiFetch(url);
const apiPost=(url,fd)=>apiFetch(url,{method:'POST',body:fd});
const apiPut=(url,fd)=>apiFetch(url,{method:'PUT',body:fd});
const apiPatch=(url,fd)=>apiFetch(url,{method:'PATCH',body:fd});
const apiDel=url=>apiFetch(url,{method:'DELETE'});

// ── Jobs ───────────────────────────────────────────────────────────────
async function handleCreate(){
  if(!S.request.trim())return;
  set({error:null,jobId:null,jobData:null,tab:'preview',editInstruction:'',logs:[],graph:null,hilData:null});
  try{
    const fd=new FormData();
    fd.append('request',S.request);
    if(S.style)fd.append('style',S.style);
    if(S.creationType)fd.append('creation_type',S.creationType);
    fd.append('hil_enabled',S.hilEnabled);
    fd.append('hil_stages',S.hilStages);
    S.images.forEach(i=>fd.append('images',i.file));
    const {job_id}=await apiPost('/api/create',fd);
    set({jobId:job_id,images:[]});
    startPolling(job_id);loadHistory();
    // Connect to network jobs
    for(const njid of S.networkJobs){
      try{const fd2=new FormData();fd2.append('source_job_id',njid);await apiPost(`/api/network/${job_id}/connect`,fd2);}catch{}
    }
  }catch(e){set({error:e.message});}
}
function startPolling(id){
  if(S.polling)clearInterval(S.polling);
  const iv=setInterval(async()=>{
    try{
      const d=await apiGet(`/api/status/${id}`);
      set({jobData:d});
      if(S.logAutoRefresh)refreshLogs(id);
      if(d.status==='paused')refreshHIL(id);
      if(d.status==='done'||d.status==='error'){
        clearInterval(iv);set({polling:null});
        loadHistory();refreshLogs(id);refreshGraph(id);
      }
    }catch{}
  },2000);
  set({polling:iv});
}
async function handleEdit(){
  if(!S.editInstruction.trim()||!S.jobId)return;
  set({editLoading:true,error:null});
  try{
    const fd=new FormData();fd.append('instruction',S.editInstruction);
    S.editImages.forEach(i=>fd.append('images',i.file));
    await apiPost(`/api/edit/${S.jobId}`,fd);
    set({editInstruction:'',editImages:[],tab:'preview'});
    startPolling(S.jobId);notify('✏️ Editando...');
  }catch(e){set({error:e.message});}
  finally{set({editLoading:false});}
}
async function handleUndo(){
  if(!S.jobId)return;
  try{
    await apiFetch(`/api/undo/${S.jobId}`,{method:'POST'});
    const d=await apiGet(`/api/status/${S.jobId}`);
    set({jobData:d,tab:'preview'});notify('↩️ Desfeito');
  }catch(e){set({error:e.message});}
}
async function loadJob(id){
  const d=await apiGet(`/api/status/${id}`);
  set({jobId:id,jobData:d,tab:'preview',editInstruction:'',page:'create',logs:[],graph:null,hilData:null});
  if(d.status==='running'||d.status==='pending'||d.status==='paused')startPolling(id);
  else{refreshLogs(id);refreshGraph(id);}
}
async function loadHistory(){try{const h=await apiGet('/api/jobs');set({history:h});}catch{}}
// ── Tools ──────────────────────────────────────────────────────────────
async function loadTools(){try{const {tools}=await apiGet('/api/tools');set({builtinTools:tools.filter(t=>!t.custom),customTools:tools.filter(t=>t.custom)});}catch{}}
async function saveTool(){
  const {name,description,code}=S.toolForm;
  if(!name.trim()||!code.trim()){notify('Nome e código obrigatórios');return;}
  try{
    const fd=new FormData();fd.append('name',name);fd.append('description',description);fd.append('code',code);
    if(S.editingTool){await apiPut(`/api/custom-tools/${S.editingTool.id}`,fd);notify('🔧 Atualizada!');}
    else{await apiPost('/api/custom-tools',fd);notify('🔧 Criada!');}
    set({toolModal:false,editingTool:null,toolForm:{name:'',description:'',code:''},toolAiDesc:''});loadTools();
  }catch(e){notify('Erro: '+e.message);}
}
async function deleteTool(id){if(!confirm('Deletar?'))return;try{await apiDel(`/api/custom-tools/${id}`);notify('🗑️ Deletada');loadTools();}catch(e){notify('Erro: '+e.message);}}
async function generateToolCode(){
  if(!S.toolAiDesc.trim()){notify('Descreva a tool');return;}
  set({toolAiLoading:true});
  try{const fd=new FormData();fd.append('description',S.toolAiDesc);const {code}=await apiPost('/api/custom-tools/generate',fd);set({toolForm:{...S.toolForm,code},toolAiLoading:false});notify('✨ Código gerado!');}
  catch(e){set({toolAiLoading:false});notify('Erro: '+e.message);}
}
// ── Publish Tool ───────────────────────────────────────────────────────
async function publishTool(){
  if(!S.publishToolId)return;
  try{
    const fd=new FormData();fd.append('description',S.publishToolForm.description);fd.append('tags',S.publishToolForm.tags);
    await apiPost(`/api/gallery/publish-tool/${S.publishToolId}`,fd);
    notify('🔧 Tool publicada na galeria!');set({publishToolModal:false,publishToolId:null});loadGallery();
  }catch(e){notify('Erro: '+e.message);}
}
// ── RAG ────────────────────────────────────────────────────────────────
async function loadRAGFiles(){try{const {files}=await apiGet('/api/rag-files');set({ragFiles:files});}catch{}}
async function uploadRAGFile(file){try{const fd=new FormData();fd.append('file',file);await apiPost('/api/rag-files',fd);notify(`📄 ${file.name}`);loadRAGFiles();}catch(e){notify('Erro: '+e.message);}}
async function toggleRAGFile(id,sel){try{const fd=new FormData();fd.append('selected',sel);await apiPatch(`/api/rag-files/${id}/select`,fd);loadRAGFiles();}catch{}}
async function deleteRAGFile(id){if(!confirm('Remover?'))return;try{await apiDel(`/api/rag-files/${id}`);notify('🗑️ Removido');loadRAGFiles();}catch(e){notify('Erro: '+e.message);}}
// ── Gallery ────────────────────────────────────────────────────────────
async function loadGallery(){
  try{const p=new URLSearchParams();if(S.galleryType)p.append('ctype',S.galleryType);if(S.gallerySearch)p.append('search',S.gallerySearch);const {entries}=await apiGet(`/api/gallery?${p}`);set({gallery:entries});}catch{}
}
async function openGalleryEntry(gid){try{const e=await apiGet(`/api/gallery/${gid}`);set({galleryEntry:e,galleryModal:true});}catch{}}
async function handlePublish(){
  if(!S.jobId)return;set({publishLoading:true});
  try{
    const fd=new FormData();fd.append('title',S.publishForm.title);fd.append('tags',S.publishForm.tags);fd.append('allow_edit',S.publishForm.allowEdit);
    await apiPost(`/api/gallery/publish/${S.jobId}`,fd);notify('🌐 Publicado!');set({publishModal:false,publishLoading:false});loadGallery();
  }catch(e){set({publishLoading:false});notify('Erro: '+e.message);}
}
async function forkEntry(gid){
  try{const e=await apiGet(`/api/gallery/${gid}`);const fd=new FormData();fd.append('request','Fork de: '+e.description);fd.append('creation_type',e.creation_type||'');const {job_id}=await apiPost('/api/create',fd);set({jobId:job_id,galleryModal:false,galleryEntry:null,page:'create'});startPolling(job_id);notify('🍴 Fork!');}
  catch(e){notify('Erro: '+e.message);}
}
// ── Logs ───────────────────────────────────────────────────────────────
async function refreshLogs(id){
  if(!id)return;
  try{const {logs}=await apiGet(`/api/logs/${id}?limit=300`);set({logs});}catch{}
}
// ── Graph ──────────────────────────────────────────────────────────────
async function refreshGraph(id){
  if(!id)return;
  try{const g=await apiGet(`/api/logs/${id}/graph`);set({graph:g});}catch{}
}
// ── HIL ────────────────────────────────────────────────────────────────
async function refreshHIL(id){
  if(!id)return;
  try{const h=await apiGet(`/api/hil/${id}`);set({hilData:h,hilEditPrompt:h.active_checkpoint?.prompt||'',hilNote:''});}catch{}
}
async function resolveHIL(resolution){
  if(!S.jobId||!S.hilData?.active_checkpoint)return;
  const cpId=S.hilData.active_checkpoint.id;
  try{
    const fd=new FormData();fd.append('resolution',resolution);fd.append('user_note',S.hilNote||'');
    if(resolution==='modify')fd.append('modified_prompt',S.hilEditPrompt);
    await apiPost(`/api/hil/${S.jobId}/resolve/${cpId}`,fd);
    notify(resolution==='approve'?'✅ Aprovado':resolution==='modify'?'✏️ Modificado e aprovado':resolution==='skip'?'⏭️ Pulado':'🛑 Pipeline parado');
    set({hilData:null});
    const d=await apiGet(`/api/status/${S.jobId}`);set({jobData:d});
    if(resolution!=='stop')startPolling(S.jobId);
  }catch(e){notify('Erro: '+e.message);}
}
async function configHIL(enabled){
  if(!S.jobId)return;
  const fd=new FormData();fd.append('enabled',enabled);fd.append('stages',S.hilStages);
  await apiPatch(`/api/hil/${S.jobId}/config`,fd);
  notify(enabled?'⏸️ HIL ativado':'▶️ HIL desativado');
}
// ── Network ────────────────────────────────────────────────────────────
async function connectToNetwork(){
  const jid=S.connectJobInput.trim();
  if(!jid)return;
  if(!S.jobId){set({networkJobs:[...new Set([...S.networkJobs,jid])],connectJobInput:''});notify(`🔗 Conectado (aplicar na criação)`);return;}
  try{const fd=new FormData();fd.append('source_job_id',jid);await apiPost(`/api/network/${S.jobId}/connect`,fd);notify('🔗 Conectado!');refreshNetwork();}
  catch(e){notify('Erro: '+e.message);}
}
async function disconnectFromNetwork(jid){
  if(!S.jobId){set({networkJobs:S.networkJobs.filter(j=>j!==jid)});return;}
  try{await apiDel(`/api/network/${S.jobId}/disconnect/${jid}`);notify('🔌 Desconectado');refreshNetwork();}
  catch(e){notify('Erro: '+e.message);}
}
async function refreshNetwork(){
  if(!S.jobId)return;
  try{const {network}=await apiGet(`/api/network/${S.jobId}`);set({networkJobs:network.map(n=>n.job_id)||[]});/* keep full objects */}catch{}
}
function addImages(files,field){const cur=S[field];const news=Array.from(files).slice(0,5-cur.length).map(f=>({file:f,url:URL.createObjectURL(f),name:f.name}));set({[field]:[...cur,...news].slice(0,5)});}

// ══════════════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════════════
function render(){
  const root=document.getElementById('root');
  root.innerHTML=S.page==='gallery'?renderGallery():renderCreate();
  if(S.toolModal)root.insertAdjacentHTML('beforeend',renderToolModal());
  if(S.ragModal)root.insertAdjacentHTML('beforeend',renderRAGModal());
  if(S.galleryModal&&S.galleryEntry)root.insertAdjacentHTML('beforeend',renderEntryModal());
  if(S.publishModal)root.insertAdjacentHTML('beforeend',renderPublishModal());
  if(S.publishToolModal)root.insertAdjacentHTML('beforeend',renderPublishToolModal());
  if(S.notification)root.insertAdjacentHTML('beforeend',`<div class="notif">${esc(S.notification)}</div>`);
  bindEvents();
  if(S.jobData?.status==='done'&&(S.tab==='code'||S.tab==='preview'))loadCode();
}

const STAGES=[
  {id:'role_assignment',icon:'👥',name:'Role Assignment',desc:'Definindo agentes'},
  {id:'topology_design',icon:'🕸️',name:'Topology',desc:'Grafo de execução'},
  {id:'semantic_completion',icon:'🧠',name:'Semantics',desc:'Configurando prompts'},
  {id:'generating',icon:'⚙️',name:'Generating',desc:'Executando agentes'},
  {id:'editing',icon:'✏️',name:'Editing',desc:'Aplicando edição'},
];
function stageStatus(sid,cur,st){
  const o=['role_assignment','topology_design','semantic_completion','generating','editing'];
  const c=o.indexOf(cur),m=o.indexOf(sid);
  if(st==='paused'&&m===c)return'paused';
  if(st==='done')return'done';
  if(st==='error'&&m===c)return'error';
  return m<c?'done':m===c?'active':'waiting';
}
const SUGGS=['🖼️ Gere imagens IA para substituir placeholders','🎨 Mude paleta para tons dourados','📱 Melhore o layout mobile','✨ Adicione animações e parallax','🚀 Adicione seção de depoimentos','💌 Adicione formulário de contato','🌙 Converta para dark mode','⚡ Adicione botão WhatsApp flutuante'];

function renderCreate(){
  const job=S.jobData;
  const running=job&&(job.status==='pending'||job.status==='running');
  const paused=job&&job.status==='paused';
  const done=job&&job.status==='done';
  const isErr=job&&job.status==='error';
  const ra=job?.pipeline?.role_assignment;
  const agents=job?.pipeline?.agents_executed||[];
  const version=job?.version||0;
  const isHtml=ra&&['website','landing_page','game','dashboard'].includes(ra.creation_type);
  const selRAG=S.ragFiles.filter(f=>f.selected).length;
  const allTools=[...S.builtinTools,...S.customTools];

  // HIL active checkpoint
  const hilActive=S.hilData?.active_checkpoint&&!S.hilData.active_checkpoint.resolved;

  return `
<header>
  <div class="logo"><span class="logo-dot"></span>Vibe Graphing · MAS Creator v4</div>
  <h1>Crie <span>qualquer coisa</span> com AI</h1>
  <p class="subtitle">Fast Mode, Deep MAS, Tools, RAG, Rede de Agentes, Logs, Human-in-the-Loop</p>
</header>
<div class="nav-tabs">
  <div class="nav-tab active">⚡ Criar</div>
  <div class="nav-tab" id="nav-gallery">🌐 Galeria Pública</div>
</div>
<div class="grid">
<div class="sidebar">

<!-- FORM -->
<div class="card">
  <div class="ct"><div class="ctl">📝 Novo Projeto</div></div>
  <textarea id="req-input" placeholder="Descreva o que quer criar...&#10;&#10;Ex: Website para confecção de roupas femininas chamada Elegance Studio.">${esc(S.request)}</textarea>
  <div class="row" style="margin-top:.6rem">
    <div class="fg"><label class="fl">Tipo</label>
      <select id="type-select">
        <option value="">🤖 Auto</option>
        <option value="website" ${S.creationType==='website'?'selected':''}>🌐 Website</option>
        <option value="landing_page" ${S.creationType==='landing_page'?'selected':''}>🚀 Landing Page</option>
        <option value="game" ${S.creationType==='game'?'selected':''}>🎮 Jogo HTML5</option>
        <option value="dashboard" ${S.creationType==='dashboard'?'selected':''}>📊 Dashboard</option>
        <option value="code" ${S.creationType==='code'?'selected':''}>💻 Código</option>
        <option value="api" ${S.creationType==='api'?'selected':''}>🔌 API</option>
        <option value="document" ${S.creationType==='document'?'selected':''}>📄 Documento</option>
        <option disabled>──</option>
        <option value="deep" ${S.creationType==='deep'?'selected':''}>🔬 Deep MAS</option>
      </select>
    </div>
    <div class="fg"><label class="fl">Estilo</label>
      <input type="text" id="style-input" value="${esc(S.style)}" placeholder="luxury, dark..."/></div>
  </div>

  <!-- HIL TOGGLE -->
  <div class="hil-toggle ${S.hilEnabled?'active':''}" id="hil-toggle" style="margin-top:.6rem">
    <span>${S.hilEnabled?'⏸️':'▶️'}</span>
    <span style="font-weight:600">${S.hilEnabled?'Human-in-the-Loop ATIVADO':'Human-in-the-Loop desativado'}</span>
    ${S.hilEnabled?`<select id="hil-stages-sel" style="margin-left:auto;font-size:.7rem;padding:.15rem .4rem;background:var(--bg3);border:1px solid var(--yellow);border-radius:4px;color:var(--yellow)">
      <option value="all" ${S.hilStages==='all'?'selected':''}>Todos os stages</option>
      <option value="generating" ${S.hilStages==='generating'?'selected':''}>Só geração</option>
      <option value="role_assignment,generating" ${S.hilStages==='role_assignment,generating'?'selected':''}>Setup + Geração</option>
    </select>`:''}
  </div>

// ── LOG PANEL ──────────────────────────────────────────────────────────
function renderLogPanel(){
  const filters=['all','prompt','output','hil','graph','error','info','tool'];
  const filtered=S.logFilter==='all'?S.logs:S.logs.filter(l=>l.level===S.logFilter);
  return `<div class="log-panel">
    <div class="log-toolbar">
      ${filters.map(f=>`<button class="log-filter ${S.logFilter===f?'active':''}" data-lf="${f}">${f}</button>`).join('')}
      <button class="btn bo" style="font-size:.65rem;padding:.18rem .45rem;margin-left:auto" id="btn-refresh-logs">🔄</button>
    </div>
    <div class="log-list" id="log-list">
      ${filtered.length===0?`<div class="es" style="padding:1.5rem"><div class="ei">📋</div>Nenhum log</div>`:''}
      ${filtered.map(l=>`
      <div class="log-entry" data-lid="${l.id}">
        <div class="log-header">
          <span class="log-level ${levelColor(l.level)}">${l.level}</span>
          ${l.agent_id?`<span class="log-agent">[${l.agent_id}]</span>`:''}
          <span class="log-title">${esc(l.title)}</span>
          <span class="log-time">${new Date(l.timestamp).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
          ${l.meta?.duration?`<span style="font-size:.58rem;color:var(--text3)">${l.meta.duration}s</span>`:''}
        </div>
        ${l.content?`<div class="log-content">${esc(l.content)}</div>`:''}
      </div>`).join('')}
    </div>
  </div>`;
}

// ── GRAPH PANEL ────────────────────────────────────────────────────────
function renderGraphPanel(){
  const g=S.graph;
  if(!g)return`<div class="graph-panel"><div class="es"><div class="ei">🗺️</div>Grafo não disponível<br><button class="btn bo" style="font-size:.75rem;margin-top:.5rem" id="btn-load-graph">Carregar grafo</button></div></div>`;

  const stages=g.topology?.stages||[];
  const agentsMap=Object.fromEntries((g.agents||[]).map(a=>[a.id,a]));

  return `<div class="graph-panel">
    <div style="font-size:.72rem;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:.75rem">
      Modo: ${g.mode} | ${g.agents?.length||0} agentes | HIL: ${g.hil_enabled?'ON':'off'} | ${g.checkpoints_count||0} checkpoints
    </div>
    ${stages.map((stage,i)=>`
    <div style="margin-bottom:.5rem">
      <div class="stage-connector">
        ${i>0?'▼ ':''}Stage ${i+1} · <strong>${stage.type}</strong>
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        ${stage.agents.map(aid=>{
          const a=agentsMap[aid]||{id:aid,role:aid,status:'pending',duration:0};
          return`<div class="graph-node gn-${a.status}" style="flex:1;min-width:200px">
            <div class="gn-icon">${a.status==='done'?'✅':a.status==='running'?'⚙️':'⏳'}</div>
            <div class="gn-info">
              <div class="gn-name">${esc(a.id)}</div>
              <div class="gn-role">${esc(a.role||'')}</div>
              <div class="gn-stats">
                ${a.duration?`⏱️ ${a.duration}s`:''} ${a.output_chars?`📝 ${(a.output_chars/1000).toFixed(1)}k chars`:''}
                ${a.quality_threshold?`🎯 threshold: ${a.quality_threshold}`:''} ${a.max_iterations>1?`🔄 max ${a.max_iterations} iter`:''}
              </div>
            </div>
            ${a.status?`<span class="gn-badge ${a.status==='done'?'bd':a.status==='running'?'ba':'bw'}">${a.status}</span>`:''}
          </div>`;
        }).join('')}
      </div>
    </div>`).join('')}
    ${g.graph_logs?.length?`<div style="margin-top:.75rem">
      <div style="font-size:.68rem;color:var(--text3);margin-bottom:.35rem;font-family:'JetBrains Mono',monospace">LOG DE EXECUÇÃO DO GRAFO</div>
      ${g.graph_logs.map(l=>`<div style="font-size:.72rem;padding:.3rem .5rem;background:rgba(6,182,212,.04);border-left:2px solid var(--accent2);margin-bottom:.25rem;font-family:'JetBrains Mono',monospace">${esc(l.title)}</div>`).join('')}
    </div>`:''}
  </div>`;
}

// ─── MARK MODE ───────────────────────────────────────────────────────────────
const markState = { active:false, sectionHtml:'', sectionPath:'', annotFiles:[] };

function enterMarkMode(){
  markState.active=true;
  set({markMode:true, tab:'preview'});
  notify('🎯 Modo Marca — clique direito em qualquer elemento no preview');
  setTimeout(injectMarkScript, 400);
  window.addEventListener('message', onIframeMessage);
}

function exitMarkMode(){
  markState.active=false; markState.sectionHtml=''; markState.sectionPath=''; markState.annotFiles=[];
  set({markMode:false});
  window.removeEventListener('message', onIframeMessage);
  sendToIframe({type:'MAS_MARK_DEACTIVATE'});
}

function injectMarkScript(){
  const iframe = document.getElementById('preview-iframe');
  if(!iframe) return;
  try {
    const idoc = iframe.contentDocument || iframe.contentWindow.document;
    if(!idoc) return;
    const old = idoc.getElementById('__mas_mark__');
    if(old) old.remove();
    const s = idoc.createElement('script');
    s.id = '__mas_mark__';
    s.textContent = [
      '(function(){',
      '  let hl=null;',
      '  function path(el){',
      '    if(!el||el===document.body)return"body";',
      '    const t=el.tagName.toLowerCase();',
      '    const id=el.id?"#"+el.id:"";',
      '    const c=el.className&&typeof el.className==="string"?"."+el.className.trim().split(/\\s+/).slice(0,2).join("."):"";',
      '    return (t+id+c).slice(0,60);',
      '  }',
      '  function showHl(el){',
      '    if(hl)hl.remove();',
      '    const r=el.getBoundingClientRect();',
      '    hl=document.createElement("div");',
      '    Object.assign(hl.style,{position:"fixed",top:r.top+"px",left:r.left+"px",width:r.width+"px",height:r.height+"px",border:"2px solid #f59e0b",borderRadius:"4px",background:"rgba(245,158,11,.08)",zIndex:"99999",pointerEvents:"none"});',
      '    document.body.appendChild(hl);',
      '  }',
      '  document.addEventListener("mouseover",function(e){',
      '    if(!window.__mas_on__)return;',
      '    if(e.target===hl)return;',
      '    showHl(e.target);',
      '  },true);',
      '  document.addEventListener("contextmenu",function(e){',
      '    if(!window.__mas_on__)return;',
      '    e.preventDefault();e.stopPropagation();',
      '    showHl(e.target);',
      '    window.parent.postMessage({type:"MAS_CTX",x:e.clientX,y:e.clientY,html:e.target.outerHTML,path:path(e.target)},"*");',
      '  },true);',
      '  document.addEventListener("click",function(e){if(window.__mas_on__){e.preventDefault();e.stopPropagation();}},true);',
      '  window.addEventListener("message",function(ev){',
      '    if(!ev.data)return;',
      '    if(ev.data.type==="MAS_MARK_ACTIVATE"){window.__mas_on__=true;document.body.style.cursor="crosshair";}',
      '    if(ev.data.type==="MAS_MARK_DEACTIVATE"){window.__mas_on__=false;document.body.style.cursor="";if(hl){hl.remove();hl=null;}}',
      '  });',
      '  window.__mas_on__=true; document.body.style.cursor="crosshair";',
      '})();'
    ].join('\n');
    idoc.head.appendChild(s);
  } catch(e){ console.warn('[MAS Mark]',e); notify('Recarregue o preview primeiro'); }
}

function sendToIframe(msg){
  const iframe=document.getElementById('preview-iframe');
  if(iframe&&iframe.contentWindow){try{iframe.contentWindow.postMessage(msg,'*');}catch(e){}}
}

function onIframeMessage(ev){
  if(!ev.data||ev.data.type!=='MAS_CTX')return;
  markState.sectionHtml = ev.data.html||'';
  markState.sectionPath = ev.data.path||'';
  const iframe = document.getElementById('preview-iframe');
  let ax=ev.data.x, ay=ev.data.y;
  if(iframe){ const r=iframe.getBoundingClientRect(); ax=r.left+ev.data.x; ay=r.top+ev.data.y; }
  const menu=document.getElementById('mark-ctx-menu');
  if(menu){
    menu.style.display='block';
    menu.style.left=Math.min(ax,window.innerWidth-170)+'px';
    menu.style.top=Math.min(ay,window.innerHeight-160)+'px';
  }
}

function hideCtxMenu(){ const m=document.getElementById('mark-ctx-menu'); if(m)m.style.display='none'; }

function openAnnotModal(){
  hideCtxMenu();
  markState.annotFiles=[];
  const ov=document.getElementById('annot-overlay');
  if(ov)ov.style.display='flex';
  const prev=document.getElementById('annot-section-preview');
  if(prev) prev.textContent=markState.sectionHtml.slice(0,400);

function closeAnnotModal(){

  row.innerHTML=markState.annotFiles.map((f,i)=>
    '<div class="annot-file-chip">'+(f.isImg?'🖼️':'📄')+' '+esc(f.name.slice(0,18))+'<button onclick="removeAnnotFile('+i+')">×</button></div>'
  ).join('')+
  '<button class="annot-add-file" id="annot-add-file-btn">+ Adicionar arquivo</button>'+
  '<input type="file" id="annot-file-input" style="display:none" multiple accept="image/*,.pdf,.txt,.md,.html,.css,.js,.json,.csv"/>';
  document.getElementById('annot-add-file-btn')?.addEventListener('click',()=>document.getElementById('annot-file-input')?.click());
  document.getElementById('annot-file-input')?.addEventListener('change',e=>addAnnotFiles(e.target.files));
}

function addAnnotFiles(files){
  Array.from(files).slice(0,5-markState.annotFiles.length).forEach(f=>{
    markState.annotFiles.push({name:f.name,file:f,isImg:f.type.startsWith('image/')});
  });
  renderAnnotFiles();
}

window.removeAnnotFile=function(i){ markState.annotFiles.splice(i,1); renderAnnotFiles(); };

async function submitAnnotation(){
  const instr=document.getElementById('annot-instruction')?.value?.trim();
  if(!instr){notify('⚠️ Escreva o que deseja mudar');return;}
  if(!markState.sectionHtml){notify('⚠️ Nenhuma seção marcada');return;}
  if(!S.jobId){notify('⚠️ Nenhum job ativo');return;}
  closeAnnotModal();
  exitMarkMode();
  const fd=new FormData();
  fd.append('instruction',instr);
  fd.append('section_html',markState.sectionHtml);
  fd.append('section_path',markState.sectionPath);
  markState.annotFiles.forEach(af=>{ fd.append(af.isImg?'images':'ref_files',af.file); });
  try{
    notify('🎯 Editando seção...');
    set({editLoading:true});
    await apiPost('/api/edit-section/'+S.jobId,fd);
    set({editLoading:false,tab:'preview'});
    startPolling(S.jobId);
  }catch(e){ set({editLoading:false}); notify('Erro: '+e.message); }
}

// ─── ASSETS PANEL ────────────────────────────────────────────────────────────
async function loadAssets(){
  try{ const d=await apiGet('/api/assets'); set({sessionAssets:d.assets||[]}); }catch{}
}

function renderAssetsPanel() {
  const assets = S.sessionAssets || [];
  if (!assets.length) return '<div class="es" style="padding:2rem"><div class="ei">📦</div>Nenhum asset gerado ainda.<br><small style="color:var(--text3)">Criados ao usar generate_image, generate_video ou uploads</small></div>';

  return '<div><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem"><div style="font-size:.78rem;color:var(--text2)">' + assets.length + ' asset(s) nesta sessão</div><button class="btn bo" style="font-size:.7rem;padding:.2rem .5rem" onclick="loadAssets()">🔄</button></div><div class="assets-grid">' +
    assets.map(function(a) {
      const url = a.url || '/api/assets/' + a.id;
      // Usando template literals para evitar erros de aspas
      return `
        <div class="asset-thumb" title="${esc(a.prompt || a.id)}" onclick="copyAssetUrl('${esc(url)}')">
          ${(a.type === 'image' && a.url ? `<img src="${esc(a.url)}" loading="lazy"/>` : `<div class="asset-icon">${a.type === 'video' ? '🎬' : a.type === 'audio' ? '🎵' : '📄'}<span>${esc(a.type)}</span></div>`)}
          <button class="asset-copy" onclick="event.stopPropagation();copyAssetUrl('${esc(url)}')">📋</button>
        </div>`;
    }).join('') + '</div></div>';
}

function copyAssetUrl(url){
  const full=url.startsWith('http')?url:window.location.origin+url;
  navigator.clipboard.writeText(full).then(()=>notify('📋 URL copiada!')).catch(()=>{});
}

// Extend state
Object.assign(S,{markMode:false,sessionAssets:[]});


window.rmImg=(i,f)=>{const a=[...S[f]];a.splice(i,1);set({[f]:a});};
// Boot
render();loadHistory();loadTools();loadRAGFiles();loadAssets();
setInterval(loadHistory,15000);setInterval(loadTools,30000);
setInterval(async()=>{if(S.jobId&&(S.jobData?.status==='paused'))await refreshHIL(S.jobId);},3000);
</script>
